<section id="about" class="section about" appReveal>
  <div class="section__inner about__layout">
    <article class="about__main">
      <p class="eyebrow">About</p>
      <h2 class="section__title">A builder who cares about the whole stack</h2>
      <p class="about__bio">{{ profile.bio }}</p>
      <ul class="about__focus">
        @for (area of profile.focusAreas; track area) {
          <li>
            <span class="about__check" aria-hidden="true">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2.5 6.2 4.8 8.5 9.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            {{ area }}
          </li>
        }
      </ul>
    </article>

    <aside class="about__aside">
      @for (stat of stats; track stat.label) {
        <div class="about__stat">
          <p class="about__stat-value">{{ stat.value }}</p>
          <p class="about__stat-label">{{ stat.label }}</p>
        </div>
      }
      <blockquote class="about__quote">
        <span class="about__quote-icon" aria-hidden="true">&gt;_</span>
        <p>{{ quote }}</p>
      </blockquote>
    </aside>
  </div>
</section>
