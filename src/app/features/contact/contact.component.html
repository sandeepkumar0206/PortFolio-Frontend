<section id="contact" class="section contact" appReveal>
  <div class="section__inner contact__grid">
    <div class="contact__intro">
      <p class="eyebrow">Contact</p>
      <h2 class="section__title">Let's build something next</h2>
      <p class="contact__lead">
        Have a role, project, or idea? Send a note — I usually reply within a couple of days.
      </p>
      <p class="contact__email">
        Or email
        <a [href]="'mailto:' + profile.email">{{ profile.email }}</a>
      </p>
    </div>

    <form class="contact__form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        <span>Name</span>
        <input
          type="text"
          formControlName="name"
          autocomplete="name"
          placeholder="Your Name"
          maxlength="120"
        />
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <small class="field-error">Please enter your name.</small>
        }
      </label>

      <label>
        <span>Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="email@address.com"
          maxlength="255"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small class="field-error">Enter a valid email.</small>
        }
      </label>

      <label>
        <span>Message</span>
        <textarea
          formControlName="message"
          rows="5"
          maxlength="2000"
          placeholder="How can I help you?"
        ></textarea>
        <small class="contact__count">{{ messageLength }} / 2000</small>
        @if (form.controls.message.touched && form.controls.message.errors?.['required']) {
          <small class="field-error">Message is required.</small>
        } @else if (form.controls.message.touched && form.controls.message.errors?.['minlength']) {
          <small class="field-error">Message should be at least 10 characters.</small>
        } @else if (form.controls.message.touched && form.controls.message.errors?.['maxlength']) {
          <small class="field-error">Message must be at most 2000 characters.</small>
        }
      </label>

      <button type="submit" class="btn btn--primary contact__submit" [disabled]="submitting">
        {{ submitting ? 'Sending…' : 'Send message' }}
      </button>

      @if (successMessage) {
        <p class="contact__status contact__status--ok" role="status">{{ successMessage }}</p>
      }
      @if (errorMessage) {
        <p class="contact__status contact__status--err" role="alert">{{ errorMessage }}</p>
      }
    </form>
  </div>
</section>
