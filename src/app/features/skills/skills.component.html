<section id="skills" class="section skills" appReveal>
  <div class="section__inner">
    <header class="skills__header">
      <p class="eyebrow">Expertise</p>
      <h2 class="section__title skills__title">Technical Proficiencies</h2>
    </header>

    <div class="skills__grid">
      @for (group of groups; track group.category) {
        <article class="skills__card">
          <div class="skills__icon" aria-hidden="true">
            @switch (group.icon) {
              @case ('layers') {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="m12 3 9 5-9 5-9-5 9-5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                  <path d="m3 12 9 5 9-5M3 16l9 5 9-5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                </svg>
              }
              @case ('database') {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <ellipse cx="12" cy="6" rx="8" ry="3" stroke="currentColor" stroke-width="1.6"/>
                  <path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" stroke="currentColor" stroke-width="1.6"/>
                </svg>
              }
              @case ('cloud') {
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M7.5 18a4.5 4.5 0 0 1-.4-9 6 6 0 0 1 11.5 1.7A3.5 3.5 0 0 1 18 18H7.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                </svg>
              }
            }
          </div>
          <h3>{{ group.category }}</h3>
          <ul class="skills__tags">
            @for (skill of group.skills; track skill) {
              <li>{{ skill }}</li>
            }
          </ul>
        </article>
      }
    </div>
  </div>
</section>
