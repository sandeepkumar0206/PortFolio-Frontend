@if (toastService.toast(); as toast) {
  <div class="toast" [class.toast--success]="toast.kind === 'success'" [class.toast--error]="toast.kind === 'error'" role="status" aria-live="polite">
    <span class="toast__icon" aria-hidden="true">
      @if (toast.kind === 'success') {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3.5 8.2 6.4 11l6.1-7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      } @else {
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      }
    </span>
    <p class="toast__message">{{ toast.message }}</p>
    <button class="toast__close" type="button" aria-label="Dismiss" (click)="toastService.dismiss()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M3.5 3.5l7 7M10.5 3.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
}
