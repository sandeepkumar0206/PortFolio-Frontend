<header class="nav" [class.nav--scrolled]="scrolled">
  <div class="nav__inner">
    <a class="nav__brand" href="#top" (click)="goToSection($event, 'top')">{{ profile.name }}</a>

    <button
      class="nav__toggle"
      type="button"
      [attr.aria-expanded]="menuOpen"
      aria-controls="site-nav"
      aria-label="Toggle navigation"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
    </button>

    <nav id="site-nav" class="nav__links" [class.nav__links--open]="menuOpen" aria-label="Primary">
      @for (link of links; track link.href) {
        <a
          [href]="link.href"
          [class.nav__link--active]="activeSection === link.id"
          (click)="goToSection($event, link.id)"
        >
          {{ link.label }}
        </a>
      }
      <button
        class="nav__theme nav__theme--mobile"
        type="button"
        [attr.aria-label]="theme.mode() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        (click)="toggleTheme()"
      >
        @if (theme.mode() === 'dark') {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.7"/>
            <path d="M12 2.5v2.2M12 19.3v2.2M2.5 12h2.2M19.3 12h2.2M5.05 5.05l1.55 1.55M17.4 17.4l1.55 1.55M18.95 5.05l-1.55 1.55M6.6 17.4l-1.55 1.55" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20.5 14.2A8.2 8.2 0 0 1 9.8 3.5 8.5 8.5 0 1 0 20.5 14.2Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
          </svg>
        }
        <span>{{ theme.mode() === 'dark' ? 'Light mode' : 'Dark mode' }}</span>
      </button>
      <a
        class="nav__cta nav__cta--mobile"
        [href]="profile.resumeUrl"
        target="_blank"
        rel="noopener noreferrer"
        (click)="closeMenu()"
      >
        Resume
      </a>
    </nav>

    <div class="nav__actions">
      <button
        class="nav__theme nav__theme--desktop"
        type="button"
        [attr.aria-label]="theme.mode() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        (click)="toggleTheme()"
      >
        @if (theme.mode() === 'dark') {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.7"/>
            <path d="M12 2.5v2.2M12 19.3v2.2M2.5 12h2.2M19.3 12h2.2M5.05 5.05l1.55 1.55M17.4 17.4l1.55 1.55M18.95 5.05l-1.55 1.55M6.6 17.4l-1.55 1.55" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20.5 14.2A8.2 8.2 0 0 1 9.8 3.5 8.5 8.5 0 1 0 20.5 14.2Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
          </svg>
        }
      </button>
      <a
        class="nav__cta nav__cta--desktop"
        [href]="profile.resumeUrl"
        target="_blank"
        rel="noopener noreferrer"
      >
        Resume
      </a>
    </div>
  </div>
</header>
