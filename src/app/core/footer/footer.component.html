<footer class="footer">
  <div class="footer__inner">
    <div class="footer__identity">
      <p class="footer__brand">{{ profile.name }}</p>
      <p class="footer__meta">{{ profile.role }} • {{ profile.location }}</p>
    </div>

    <ul class="footer__socials">
      @for (social of profile.socials; track social.label) {
        <li>
          <a [href]="social.url" target="_blank" rel="noopener noreferrer">{{ social.label }}</a>
        </li>
      }
    </ul>
  </div>

  <div class="footer__bottom">
    <p class="footer__copy">© {{ year }} {{ profile.name }}. Built with Angular &amp; Spring Boot.</p>
  </div>
</footer>
